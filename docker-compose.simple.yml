version: '3.9'

services:
  frontend:
    container_name: agentgpt-frontend
    build:
      context: ./next
      dockerfile: Dockerfile
    ports:
      - "11230:3000"
    network_mode: bridge
    depends_on:
      - platform

  platform:
    container_name: agentgpt-platform
    build:
      context: ./platform
    ports:
      - "11231:8000"
    restart: always
    network_mode: bridge
    environment:
      REWORKD_PLATFORM_HOST: 0.0.0.0
      REWORKD_PLATFORM_DB_HOST: host.docker.internal
      REWORKD_PLATFORM_DB_PORT: "3307"
      REWORKD_PLATFORM_DB_USER: "reworkd_platform"
      REWORKD_PLATFORM_DB_PASS: "reworkd_platform"
      REWORKD_PLATFORM_DB_BASE: "reworkd_platform"
    extra_hosts:
      - "host.docker.internal:host-gateway"

  agentgpt_db:
    image: mysql:8.0
    container_name: agentgpt_db
    restart: always
    build:
      context: ./db
    ports:
      - "3308:3307"
    network_mode: bridge
    environment:
      MYSQL_DATABASE: "reworkd_platform"
      MYSQL_USER: "reworkd_platform"
      MYSQL_PASSWORD: "reworkd_platform"
      MYSQL_ROOT_PASSWORD: "reworkd_platform"
      MYSQL_TCP_PORT: 3307
    command: [ 'mysqld', '--character-set-server=utf8mb4', '--collation-server=utf8mb4_unicode_ci' ]
